version: '3.8'

services:
  # Servicio principal - Apache + PHP
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milkshakes_drs_web
    image: milkshakes-drs:latest
    ports:
      # Puerto externo:Puerto interno del contenedor
      - "80:80"
      - "443:443"
    volumes:
      # Mapear el código fuente para cambios en vivo
      - .:/var/www/html
      # Mapear configuración de Apache
      - ./config/apache-vhost.conf:/etc/apache2/sites-available/milkshakesdrs.conf
      # Mapear logs del contenedor al host
      - ./logs:/var/www/html/logs
    environment:
      - PHP_IDE_CONFIG=serverName=localhost
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - APACHE_LOG_DIR=/var/log/apache2
    networks:
      - milkshakes_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/verificar.php"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

