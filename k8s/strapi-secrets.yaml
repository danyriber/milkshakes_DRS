apiVersion: v1
kind: Secret
metadata:
  name: strapi-db-secret
type: Opaque
stringData:
  password: "strapi_password_here"
---
apiVersion: v1
kind: Secret
metadata:
  name: strapi-app-keys
stringData:
  keys: "key1,key2,key3,key4"
---
apiVersion: v1
kind: Secret
metadata:
  name: strapi-admin-jwt
stringData:
  secret: "<your-admin-jwt-secret>"
---
apiVersion: v1
kind: Secret
metadata:
  name: strapi-transfer-salt
stringData:
  salt: "<your-transfer-salt>"
