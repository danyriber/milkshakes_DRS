# Configuración de Nginx para Milkshakes DRS
server {
    listen 80;
    listen [::]:80;
    
    server_name milkshakesdrs.local www.milkshakesdrs.local;
    
    root /var/www/html/milkshakes_drs;
    index index.php index.html index.htm;
    
    # Logs
    access_log /var/log/nginx/milkshakesdrs_access.log;
    error_log /var/log/nginx/milkshakesdrs_error.log;
    
    # Reescrituras de URL
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Procesar archivos PHP con PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    
    # Denegar acceso a archivos y directorios ocultos
    location ~ /\. {
        deny all;
    }
    
    # Proteger archivos de configuración
    location ~ /config {
        deny all;
    }
    
    # Permitir acceso a activos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-component text/x-cross-domain-policy;
    
    # Limitación de velocidad (opcional)
    # limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # limit_req zone=general burst=20 nodelay;
}

