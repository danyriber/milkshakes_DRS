<VirtualHost *:80>
    ServerName milkshakesdrs.local
    ServerAlias www.milkshakesdrs.local
    ServerAdmin admin@milkshakesdrs.local
    
    DocumentRoot /var/www/html/milkshakes_drs
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/milkshakesdrs_error.log
    CustomLog ${APACHE_LOG_DIR}/milkshakesdrs_access.log combined
    
    # Habilitar reescritura de URLs (mod_rewrite)
    <Directory /var/www/html/milkshakes_drs>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Reescrituras para URLs limpias (opcional)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php?path=$1 [QSA,L]
    </Directory>
    
    # Permitir acceso a directorios específicos
    <Directory /var/www/html/milkshakes_drs/images>
        Allow from all
    </Directory>
    
    <Directory /var/www/html/milkshakes_drs/css>
        Allow from all
    </Directory>
    
    <Directory /var/www/html/milkshakes_drs/js>
        Allow from all
    </Directory>
    
    # Seguridad: Denegar acceso a archivos sensibles
    <Files "*.php">
        SetHandler application/x-httpd-php
    </Files>
    
    # Proteger archivos de configuración
    <FilesMatch "\.env$|config\.php$|\.htaccess$">
        Order allow,deny
        Deny from all
    </FilesMatch>
    
    # HTTPS redireccionamiento (opcional, comentado)
    # <IfModule mod_ssl.c>
    #     RewriteEngine On
    #     RewriteCond %{HTTPS} off
    #     RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    # </IfModule>
    
    # Compresión de contenido
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE text/javascript
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/x-javascript
    </IfModule>
    
    # Cachés
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType text/javascript "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
    </IfModule>
    
</VirtualHost>

